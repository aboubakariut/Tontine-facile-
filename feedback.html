<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback - Tontine Facile</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <script src="side.js"></script>
    <header>
        <h2>Votre avis compte</h2>
        <p>Aidez-nous à améliorer Tontine Facile</p>
    </header>
    <div class="container">
        <div class="card">
            <form id="feedbackForm">
                <label for="type">Type de message</label>
                <select id="type" required>
<option value="">Choisir...</option>
<option value="suggestion">Suggestion d'amélioration</option>
<option value="bug">Signaler un bug / problème</option>
<option value="felicitation">Félicitations / point positif</option>
<option value="autre">Autre</option>
</select>
                <label for="message">Votre message</label>
                <textarea id="message" rows="6" placeholder="Décrivez votre retour, idée ou problème..." required>
</textarea>
                <label for="email">Email (optionnel – pour réponse)</label>
                <input type="email" id="email" placeholder="votre@email.cm">
                <div style="margin: 20px 0;">
                    <button type="submit" class="btn" style="width: 100%; padding: 16px;">
Envoyer mon feedback
</button>
                </div>
                <p style="text-align: center; color: #6b7280; font-size: 0.9rem;">
                    Nous lisons tous les messages et répondons dans les 48h quand c’est nécessaire.</p>
            </form>
        </div>
        <a href="profile.html" class="btn btn-outline" style="margin: 24px 0; display: block; text-align: center;">
← Retour au profil
</a>
    </div>
    <script src="footer.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('feedbackForm').addEventListener('submit', e => {
            e.preventDefault();
            const type = document.getElementById('type').value;
            const message = document.getElementById('message').value.trim();
            const email = document.getElementById('email').value.trim();
            if (message.length < 10) {
                alert("Votre message est trop court. Décrivez-nous plus en détail s’il vous plaît.");
                return;
            }
            alert(`Merci pour votre retour ! �n\nType : ${type}\nMessage : \( {message}\n \){email ? 'Email : ' + email :
''}\n\n(Nous avons bien reçu votre message – simulation)`);
            // Reset formulaire
            document.getElementById('feedbackForm').reset();
        });
    </script>
</body>

</html>
