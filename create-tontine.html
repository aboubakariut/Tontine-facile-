<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Créer une Tontine - Tontine Facile</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1d4ed8">
    <meta name="description" content="Gérez vos Adachi, njangi et tontines en toute transparence">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tontine Facile">
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json">
    <!-- Icônes (ajoute-les dans un dossier /icons/) -->
    <link rel="icon" href="icons/icon-192x192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png" sizes="192x192">
    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker enregistré !', reg))
                    .catch(err => console.log('Échec enregistrement SW :', err));
            });
        }
    </script>
</head>

<body>
    <script src="side.js"></script>
    <header>
        <h2>Créer une nouvelle tontine</h2>
        <p>Configurez votre Adachi / njangi en quelques clics</p>
    </header>
    <div class="container">
        <div class="card">
            <form id="createTontineForm">
                <label for="name">Nom de la tontine <span style="color: #991b1b;">*</span></label>
                <div style="position: relative;">
                    <input type="text" id="name" placeholder="Exemple: adachi Famille 2026" required/>
                    <i class="fa fa-users" style="position: absolute; right: 12px; top: 38px; color: #1d4ed8;"></i>
                </div>
                <label for="amount">Montant par cotisation (FCFA) <span style="color: #991b1b;">*</span></label>
                <input type="number" id="amount" placeholder="minimum 1000" min="1000" required/>
                <label for="frequency">Fréquence des cotisations <span style="color: #991b1b;">*</span></label>
                <select id="frequency" required>
                    <option value="">Choisir...</option>
                    <option value="daily">Quotidienne</option>
                    <option value="weekly" selected>Hebdomadaire</option>
                    <option value="biweekly">Toutes les 2 semaines</option>
                    <option value="monthly">Mensuelle</option>
                </select>
                <label for="totalMembers">Nombre total de membres <span style="color: #991b1b;">*</span></label>
                <input type="number" id="totalMembers" placeholder="minimum 2" min="2" max="50" required/>
                <label for="startDate">Date de début <span style="color: #991b1b;">*</span></label>
                <input type="date" id="startDate" required/><label for="paymentMethod">Méthode de paiement principale</label>
                <select id="paymentMethod">
                    <option value="momo">MTN MoMo</option>
                    <option value="orange">Orange Money</option>
                    <option value="both" selected>Les deux (MoMo + Orange)</option>
                    <option value="cash">Espèces (manuel)</option>
                </select>
                <label for="orderType">Ordre des bénéficiaires</label>
                <select id="orderType">
                    <option value="fixed" selected>Ordre fixe (défini maintenant ou plus tard)</option>
                    <option value="random">Tirage au sort automatique</option>
                    <option value="auction">Enchères (le plus offrant reçoit)</option>
                </select>
                <!-- Champ conditionnel : ordre fixe → on pourra ajouter liste membres plus tard -->
                <div id="fixedOrderSection" style="display: none; margin-top: 16px;">
                    <label>Ajouter les membres dans l'ordre (optionnel pour l'instant)</label>
                    <small style="display: block; color: #4b5563;">Tu pourras inviter / ordonner après création</small>
                </div>
                <label for="description">Description / Règles spéciales (optionnel)</label>
                <textarea id="description" rows="4" placeholder="Ex: Pas de retard toléré après 2 jours, pénalité 10%, etc.">
                </textarea>
                <label style="font-size: 0.9rem;">
                <!-- <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; margin: 20px 0;"> -->
                    <input type="checkbox" required style="margin:0;padding:0;position: absolute;width: 10px"/>
                    <span style="margin-left:15px;position: relative;top:-5px">Je certifie être le gestionnaire et j'accepte les <a href="#" style="color: #16a34a;">conditions</a></span> 
                    
                </label>
                <button type="submit" class="btn">Créer la tontine <i class="fa fa-plus-circle"></i></button>
            </form>
        </div>
        <a href="dashboard.html" class="btn btn-outline" style="margin: 20px 0; display: block; text-align: center;">
            ← Annuler et quitter
        </a>
    </div>
    <script src="footer.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Montrer/cacher section ordre fixe
        document.getElementById('orderType').addEventListener('change', function() {
            const section = document.getElementById('fixedOrderSection');
            section.style.display = this.value === 'fixed' ? 'block' : 'none';
        });
        // Validation + simulation création
        document.getElementById('createTontineForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const amount = document.getElementById('amount').value;
            const members = document.getElementById('totalMembers').value;
            if (!name) {
                alert("Donnez un nom à votre tontine !");
                return;
            }
            if (amount < 1000) {
                alert("Le montant minimum est de 1 000 FCFA.");
                return;
            }
            if (members < 2 || members > 50) {
                alert("Le nombre de membres doit être entre 2 et 50.");
                return;
            }
            alert(`Tontine créée avec succès ! �n\nNom: ${name}\nMontant: ${amount} FCFA\nMembres:
${members}\n\n(Dans la vraie version : enregistrement en base + invitation des membres via lien ou
numéro)`);
            // Simulation : redirection après 1s
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>

</html>
