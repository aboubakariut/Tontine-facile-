<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tontine Facile</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1d4ed8">
    <meta name="description" content="Gérez vos Adachi, njangi et tontines en toute transparence">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tontine Facile">
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json">
    <!-- Icônes (ajoute-les dans un dossier /icons/) -->
    <link rel="icon" href="icons/icon-192x192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png" sizes="192x192">
    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker enregistré !', reg))
                    .catch(err => console.log('Échec enregistrement SW :', err));
            });
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #1d4ed8, #16a34a);
            color: white;
        }
        
        .splash {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        
        .logo {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 16px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }
        
        .slogan {
            font-size: 1.4rem;
            margin: 16px 0 40px;
            opacity: 0.95;
        }
        
        .btn-start {
            background: white;
            color: #1d4ed8;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }
        
        .btn-start:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body>
  <div class="splash">
        <div class="logo">Tontine Facile</div>
        <div class="slogan">Gérez vos Adachi et njangi en toute transparence</div>
        <div style="margin: 32px 0;">
            <i class="fa-solid fa-users" style="font-size: 4rem; opacity: 0.9;"></i>
        </div>
        <a href="login.html" class="btn-start">Commencer</a>
        <p style="margin-top: 40px; font-size: 0.9rem; opacity: 0.8;">
            Version 1.0 • Ngaoundéré, Cameroun
        </p>
    </div>
    <!-- <script>
        // Redirection automatique après 4 secondes (optionnel)
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 10000);
    </script> -->
</body>

</html>
