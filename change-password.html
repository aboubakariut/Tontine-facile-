<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Changer le mot de passe - Tontine Facile</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1d4ed8">
    <meta name="description" content="Gérez vos Adachi, njangi et tontines en toute transparence">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tontine Facile">
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json">
    <!-- Icônes (ajoute-les dans un dossier /icons/) -->
    <link rel="icon" href="icons/icon-192x192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png" sizes="192x192">
    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker enregistré !', reg))
                    .catch(err => console.log('Échec enregistrement SW :', err));
            });
        }
    </script>
</head>

<body>
    <script src="side.js"></script>
    <header>
        <h2>Changer le mot de passe</h2>
        <p>Créez un nouveau mot de passe sécurisé</p>
    </header>
    <div class="container">
        <div class="card">
            <form id="changePasswordForm">
                <label for="currentPassword">Mot de passe actuel</label>
                <div style="position: relative;">
                    <input type="password" id="currentPassword" required placeholder="••••••••">
                    <i class="fa fa-eye toggle-password" style="position: absolute; right: 12px; top: 22px; color: #6b7280;cursor: pointer;font-size:1.2em"></i>
                </div>
                <label for="newPassword">Nouveau mot de passe</label>
                <div style="position: relative;">
                    <input type="password" id="newPassword" required minlength="6" placeholder="Minimum 6 caractères">
                    <i class="fa fa-eye toggle-password" style="position: absolute; right: 12px; top: 22px; color: #6b7280; cursor: pointer;font-size:1.2em"></i>
                </div>
                <label for="confirmPassword">Confirmer le nouveau mot de passe</label>
                <div style="position: relative;">
                    <input type="password" id="confirmPassword" required placeholder="Confirmez le nouveau mot de passe">
                    <i class="fa fa-eye toggle-password" style="position: absolute; right: 12px; top: 22px; color: #6b7280; cursor: pointer;font-size:1.2em"></i>
                </div>
                <div style="margin: 16px 0; color: #ef4444; font-size: 0.9rem;" id="errorMsg"></div><button type="submit" class="btn" style="width: 100%; padding: 16px; font-size: 1.1rem;">
                    Mettre à jour le mot de passe
                </button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: #6b7280;">
                <a href="profile.html" style="color: #1d4ed8;">← Retour au profil</a>
            </p>
        </div>
    </div>
    <script src="footer.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Afficher / masquer mot de passe
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', () => {
                const input = icon.previousElementSibling;
                const type = input.type === 'password' ? 'text' : 'password';
                input.type = type;
                icon.classList.toggle('fa-eye');
                icon.classList.toggle('fa-eye-slash');
            });
        });
        // Validation + simulation
        document.getElementById('changePasswordForm').addEventListener('submit', e => {
            e.preventDefault();
            const current = document.getElementById('currentPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '';
            if (newPwd.length < 6) {
                errorMsg.textContent = "Le nouveau mot de passe doit contenir au moins 6 caractères.";
                return;
            }
            if (newPwd !== confirm) {
                errorMsg.textContent = "Les deux mots de passe ne correspondent pas.";
                return;
            }
            // Simulation succès
            alert("Mot de passe changé avec succès !\nVous devrez vous reconnecter avec le nouveau mot de passe.");
            window.location.href = 'login.html'; // redirection vers login
        });
    </script>
</body>

</html>
